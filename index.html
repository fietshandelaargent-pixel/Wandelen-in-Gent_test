<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groetjes uit Gent</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- START -->
<div id="startScreen" class="screen active">
  <div class="content">
    <h1>Groetjes uit Gent</h1>
    <p class="subtitle">
      Ontdek de stad en maak jouw eigen postkaart
    </p>

    <button id="openCameraBtn" class="primary">
      📸 Maak jouw postkaart
    </button>

    <p class="hint">Scan. Maak. Bewaar.</p>
  </div>
</div>

<!-- CAMERA -->
<div id="cameraScreen" class="screen">
  <div class="camera-wrapper">

    <video id="video" autoplay playsinline></video>
    <img id="overlay" src="" />

    <p class="camera-hint">📸 Zet jezelf of je omgeving in beeld</p>

  </div>

  <div class="controls">
    <button id="captureBtn" class="capture">
      📸 Maak postkaart
    </button>

    <button id="switchCameraBtn" class="secondary">
      🔄 Wissel camera
    </button>
  </div>
</div>

<!-- RESULT -->
<div id="resultScreen" class="screen">

  <div class="content">
    <h2>🎉 Jouw postkaart</h2>

    <img id="resultImage">

    <div class="controls">
      <a id="downloadBtn" class="primary" download="postkaart.png">
        📥 Bewaar postkaart
      </a>

      <button id="retryBtn" class="secondary">
        📸 Maak nog één
      </button>
    </div>

    <p class="save-hint">
      👉 Houd de afbeelding ingedrukt om op te slaan
    </p>

    <p class="share">
      📸 Deel jouw Gent-moment<br>
      <strong>#maandvandevoetganger</strong>
    </p>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
