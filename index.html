<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Groetjes uit Gent</title>

  <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="startScreen" class="screen active">
  <h1>Groetjes uit Gent</h1>
  <p>Maak je eigen postkaart</p>
  <button id="openCameraBtn">📸 Maak postkaart</button>
</div>

<div id="cameraScreen" class="screen">
  <div class="camera-wrapper">
    <video id="video" autoplay playsinline></video>
    <img id="overlay" src="./assets/postcard-overlay.png">
  </div>

  <button id="captureBtn">📸</button>
  <button id="switchCameraBtn">🔄 Wissel camera</button>
</div>

<div id="resultScreen" class="screen">
  <img id="resultImage">
  <a id="downloadBtn">📥 Bewaar postkaart</a>
